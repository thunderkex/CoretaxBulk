name: Create Release

on:
  workflow_dispatch:
  push:
    branches:
      - '**'
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - name: Create ZIP file
        run: zip -r coretax-bulk-download.zip . -x "*.git*" ".github/*"
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: coretax-bulk-download.zip
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}